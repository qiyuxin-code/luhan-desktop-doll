<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌宠操作列表</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      .menu-card {
        position: relative;
        width: calc(100vw - 10px);
        height: calc(100vh - 10px);
        margin: 5px;
        padding: 4px 5px;
        border: 1px solid rgba(234, 176, 82, 0.42);
        border-radius: 13px;
        background:
          radial-gradient(circle at 86% 8%, rgba(255, 235, 153, 0.8), transparent 18%),
          linear-gradient(180deg, #fff7c9 0%, #ffefaa 100%);
        box-shadow:
          0 10px 22px rgba(181, 126, 37, 0.22),
          inset 0 0 0 1px rgba(255, 255, 255, 0.62);
        color: #5c4215;
        overflow: hidden;
      }

      .sparkle {
        position: absolute;
        color: #f0a51d;
        font-size: 8px;
        line-height: 1;
        opacity: 0.8;
        pointer-events: none;
      }

      .sparkle.top {
        top: 3px;
        left: 50%;
      }

      .sparkle.right {
        top: 4px;
        right: 10px;
      }

      .action-list {
        display: grid;
        gap: 1px;
        margin: 0;
        padding: 4px 0 2px;
        list-style: none;
      }

      .menu-action {
        display: grid;
        grid-template-columns: 17px 1fr 4px;
        align-items: center;
        width: 100%;
        min-height: 12px;
        padding: 0 4px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #654817;
        font: inherit;
        font-size: 8px;
        font-weight: 700;
        text-align: left;
        cursor: pointer;
      }

      .menu-action:hover,
      .menu-action:focus-visible {
        outline: none;
        background: rgba(255, 255, 255, 0.58);
        box-shadow: inset 0 0 0 1px rgba(224, 162, 50, 0.24);
      }

      .icon {
        font-size: 10px;
      }

      .dot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #eca51f;
        opacity: 0;
      }

      .divider {
        height: 1px;
        margin: 1px 4px 2px;
        background: rgba(157, 111, 32, 0.24);
      }

      .close-action {
        color: #d64535;
      }

      .close-action .icon {
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <nav class="menu-card" aria-label="桌宠操作列表">
      <span class="sparkle top">☆</span>
      <span class="sparkle right">✦</span>
      <ul class="action-list">
        <li>
          <button class="menu-action" type="button" data-pose="flower-list">
            <span class="icon">🌸</span>
            <span>闻花</span>
            <span class="dot"></span>
          </button>
        </li>
        <li>
          <button class="menu-action" type="button" data-pose="bubble-list">
            <span class="icon">🫧</span>
            <span>泡泡</span>
            <span class="dot"></span>
          </button>
        </li>
        <li>
          <button class="menu-action" type="button" data-pose="haha">
            <span class="icon">😄</span>
            <span>哈哈</span>
            <span class="dot"></span>
          </button>
        </li>
        <li>
          <button class="menu-action" type="button" data-pose="xuanzhuan">
            <span class="icon">🔄</span>
            <span>旋转</span>
            <span class="dot"></span>
          </button>
        </li>
        <li>
          <button class="menu-action" type="button" data-pose="sing">
            <span class="icon">🎵</span>
            <span>唱歌</span>
            <span class="dot"></span>
          </button>
        </li>
      </ul>
      <div class="divider"></div>
      <button class="menu-action close-action" type="button" data-close-pet>
        <span class="icon">×</span>
        <span>关闭</span>
        <span class="dot"></span>
      </button>
    </nav>

    <script>
      const menu = window.desktopPetMenu;

      document.querySelectorAll("[data-pose]").forEach((button) => {
        button.addEventListener("click", () => {
          menu?.selectPose(button.dataset.pose);
        });
      });

      document.querySelector("[data-close-pet]")?.addEventListener("click", () => {
        menu?.closePet();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          menu?.close();
        }
      });
    </script>
  </body>
</html>
